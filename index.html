<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Mon — Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  :root{
    --bg:#0a0612; --neon:#b14bff; --neon2:#19d3ff; --accent:#ff2e87;
    --card:rgba(255,255,255,.06); --text:#f4f0ff; --muted:#a99dc4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Montserrat',system-ui,sans-serif;color:var(--text);
    background:var(--bg);min-height:100vh;overflow-x:hidden;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  /* animated gradient aurora background */
  body::before{
    content:"";position:fixed;inset:-30%;z-index:-2;
    background:
      radial-gradient(40% 50% at 20% 30%,var(--neon) 0%,transparent 60%),
      radial-gradient(45% 55% at 80% 20%,var(--neon2) 0%,transparent 60%),
      radial-gradient(50% 60% at 50% 90%,var(--accent) 0%,transparent 60%);
    filter:blur(60px);opacity:.45;animation:drift 18s ease-in-out infinite alternate;
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;
    background:radial-gradient(circle at 50% 0%,transparent 0%,var(--bg) 75%);
  }
  @keyframes drift{
    0%{transform:translate(-4%,-3%) scale(1)}
    100%{transform:translate(4%,4%) scale(1.12)}
  }
  .card{
    width:100%;max-width:440px;background:var(--card);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);border-radius:28px;
    padding:40px 28px 32px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.15);
    animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
  .avatar{
    width:128px;height:128px;border-radius:50%;margin:0 auto 18px;
    display:grid;place-items:center;font-size:3rem;color:#fff;
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    box-shadow:0 0 0 4px rgba(255,255,255,.08),0 0 40px var(--neon);
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{50%{box-shadow:0 0 0 4px rgba(255,255,255,.08),0 0 60px var(--neon2)}}
  h1{
    font-family:'Orbitron',sans-serif;font-size:2.2rem;letter-spacing:2px;
    background:linear-gradient(90deg,var(--neon2),var(--neon),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .tag{color:var(--muted);font-size:.95rem;margin:8px 0 4px;font-weight:600}
  .loc{color:var(--muted);font-size:.82rem;margin-bottom:22px}
  .loc i{color:var(--accent)}
  /* social row */
  .socials{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:26px}
  .socials a{
    width:50px;height:50px;border-radius:14px;display:grid;place-items:center;
    font-size:1.25rem;color:var(--text);text-decoration:none;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
    transition:transform .2s,background .2s,box-shadow .2s;
  }
  .socials a:hover{transform:translateY(-4px) scale(1.06);background:var(--neon);box-shadow:0 8px 24px rgba(177,75,255,.5)}
  /* link buttons */
  .links{display:flex;flex-direction:column;gap:12px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:15px;border-radius:16px;font-weight:600;font-size:1rem;
    text-decoration:none;color:var(--text);
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    transition:transform .2s,background .2s;
  }
  .btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.13)}
  .btn.tip{
    background:linear-gradient(135deg,var(--accent),var(--neon));
    border:none;color:#fff;font-weight:800;font-size:1.05rem;
    box-shadow:0 10px 30px rgba(255,46,135,.45);
  }
  .btn.tip:hover{box-shadow:0 14px 38px rgba(255,46,135,.6)}
  .tip-row{display:flex;gap:10px;margin-top:4px}
  .tip-row .amt{
    flex:1;padding:13px 0;border-radius:14px;font-weight:700;cursor:pointer;
    color:var(--text);background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);transition:.2s;
  }
  .tip-row .amt:hover{background:var(--neon2);color:#06121a;border-color:transparent}
  .foot{margin-top:24px;font-size:.74rem;color:var(--muted)}
  @media(max-width:380px){h1{font-size:1.8rem}.socials a{width:46px;height:46px}}
</style>
</head>
<body>
  <main class="card">
    <div class="avatar"><i class="fa-solid fa-headphones-simple"></i></div>
    <h1>DJ&nbsp;Mon</h1>
    <p class="tag">Egyptian · Party · Open-Format</p>
    <p class="loc"><i class="fa-solid fa-location-dot"></i> Cincinnati, OH · Available for bookings</p>

    <nav class="socials" aria-label="Social media">
      <a href="https://www.instagram.com/dj__mon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@_dj_mon" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a href="https://linktr.ee/dj_mon" aria-label="LinkTree"><i class="fab fa-linktree"></i></a>
    </nav>

    <!-- <div class="links">
      <a class="btn" href="mailto:mainmedian@gmail.com"><i class="fa-solid fa-envelope"></i> Book Me</a>

      <a class="btn tip" id="tipBtn" href="https://ko-fi.com/dj_mon"><i class="fa-solid fa-mug-hot"></i> Tip the DJ</a>
      <div class="tip-row">
        <button class="amt" data-amt="5">$5</button>
        <button class="amt" data-amt="10">$10</button>
        <button class="amt" data-amt="20">$20</button>
      </div>
    </div> -->

    <p class="foot">© 2026 DJ Mon · Turn it up 🔊</p>
  </main>

<script>
  // Wire tip amounts to your payment provider (Venmo/PayPal/Stripe/Ko-fi).
  // Replace the URL builder below with your real link.
  const tipUrl = amt => `https://venmo.com/u/your-handle?txn=pay&amount=${amt}&note=DJ%20Mon%20tip`;
  document.querySelectorAll('.amt').forEach(b=>{
    b.addEventListener('click',()=>window.open(tipUrl(b.dataset.amt),'_blank','noopener'));
  });
  document.getElementById('tipBtn').addEventListener('click',e=>{
    e.preventDefault();window.open(tipUrl(10),'_blank','noopener');
  });
</script>
</body>
</html>
